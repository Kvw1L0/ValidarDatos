<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard - Santander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #f4f4f4; background-image: url('fondo.png'); background-size: cover; background-attachment: fixed; }
        .panel { background: rgba(255, 255, 255, 0.95); border-radius: 24px; border-top: 8px solid #ec0000; }
        .feed-item { border-left: 4px solid #ec0000; background: rgba(236, 0, 0, 0.03); }
    </style>
</head>
<body class="min-h-screen p-6 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-6 border-b border-gray-200">
            <h1 class="text-4xl font-black text-[#ec0000] italic tracking-tighter">SANTANDER <span class="text-gray-800">INSIGHTS</span></h1>
            <button onclick="exportarCSV()" class="bg-[#ec0000] text-white font-bold px-8 py-3 rounded-full shadow-lg hover:bg-red-700 transition">EXPORTAR DATA</button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10 text-center">
            <div class="panel p-8 shadow-xl">
                <p class="text-gray-400 font-bold uppercase text-xs">Registrados</p>
                <h2 id="t-reg" class="text-6xl font-black text-gray-800">0</h2>
            </div>
            <div class="panel p-8 shadow-xl">
                <p class="text-gray-400 font-bold uppercase text-xs">Asistencia</p>
                <h2 id="t-asist" class="text-6xl font-black text-[#ec0000]">0</h2>
            </div>
            <div class="panel p-8 shadow-xl">
                <p class="text-gray-400 font-bold uppercase text-xs">Cumplimiento</p>
                <h2 id="t-porc" class="text-6xl font-black text-gray-800">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="panel p-8 shadow-xl"><canvas id="ageChart"></canvas></div>
            <div class="panel p-8 shadow-xl overflow-y-auto max-h-[500px]">
                <h3 class="font-black text-gray-400 uppercase text-xs mb-6">Muro de Sueños Santander</h3>
                <div id="feed" class="space-y-4"></div>
            </div>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ctx = document.getElementById('ageChart').getContext('2d');
        let ageChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['<18', '18-25', '26-35', '36-50', '50+'], datasets: [{ data: [0,0,0,0,0], backgroundColor: '#ec0000', borderRadius: 10 }] },
            options: { plugins: { legend: { display: false } } }
        });

        db.collection("invitados").onSnapshot(snap => {
            let reg = snap.size, asist = 0, eds = [0,0,0,0,0], html = '';
            snap.forEach(doc => {
                const d = doc.data();
                if(d.asistio) asist++;
                const e = parseInt(d.edad);
                if(e<18) eds[0]++; else if(e<=25) eds[1]++; else if(e<=35) eds[2]++; else if(e<=50) eds[3]++; else eds[4]++;
                if(d.asistio) html = `<div class="p-4 feed-item rounded-r-xl"><p class="text-xs font-black text-[#ec0000]">${d.nombre}</p><p class="italic font-medium text-gray-700">"${d.sueno}"</p></div>` + html;
            });
            document.getElementById('t-reg').innerText = reg;
            document.getElementById('t-asist').innerText = asist;
            document.getElementById('t-porc').innerText = reg > 0 ? Math.round((asist/reg)*100) + "%" : "0%";
            document.getElementById('feed').innerHTML = html || '<p class="text-gray-400 italic">Esperando ingresos...</p>';
            ageChart.data.datasets[0].data = eds;
            ageChart.update();
        });

        function exportarCSV() {
            db.collection("invitados").get().then(snap => {
                let csv = "\uFEFFNombre,Edad,Sueño,Asistió\n";
                snap.forEach(doc => { const d = doc.data(); csv += `${d.nombre},${d.edad},"${d.sueno}",${d.asistio?'SI':'NO'}\n`; });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = window.URL.createObjectURL(blob);
                link.download = 'data_santander_sueños.csv';
                link.click();
            });
        }
    </script>
</body>
</html>
