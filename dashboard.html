<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard - Evento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">LIVE INSIGHTS</h1>
                <p class="text-slate-500 font-medium">Monitoreo de Sueños y Asistencia</p>
            </div>
            <div id="reloj" class="text-xl font-mono bg-white px-4 py-2 rounded-lg shadow-sm border text-indigo-600">00:00:00</div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-blue-500">
                <p class="text-sm font-bold text-slate-400 uppercase">Total Registrados</p>
                <h2 id="total-reg" class="text-4xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-green-500">
                <p class="text-sm font-bold text-slate-400 uppercase">Han Ingresado</p>
                <h2 id="total-asist" class="text-4xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border-b-4 border-indigo-500">
                <p class="text-sm font-bold text-slate-400 uppercase">% de Asistencia</p>
                <h2 id="porcentaje" class="text-4xl font-black text-indigo-600">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-4 italic underline decoration-indigo-300">Distribución por Edad</h3>
                <canvas id="ageChart"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="font-bold text-slate-700 mb-4">Muro de los Sueños (Últimos ingresos)</h3>
                <div id="dream-feed" class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyArFGT5ur4H4A-WEqvb1uXnx_tjM5LKgxo",
            authDomain: "validardatosevento.firebaseapp.com",
            projectId: "validardatosevento",
            storageBucket: "validardatosevento.firebasestorage.app",
            messagingSenderId: "1047221383023",
            appId: "1:1047221383023:web:34dcd03db945d86d73c29a"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Inicializar Gráfico
        const ctx = document.getElementById('ageChart').getContext('2d');
        let ageChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['< 18', '18-25', '26-35', '36-50', '50+'],
                datasets: [{
                    label: 'Cantidad de Personas',
                    data: [0, 0, 0, 0, 0],
                    backgroundColor: '#6366f1'
                }]
            }
        });

        // Escuchar cambios en Firebase en TIEMPO REAL
        db.collection("invitados").onSnapshot((snapshot) => {
            let total = snapshot.size;
            let asistidos = 0;
            let edades = [0, 0, 0, 0, 0];
            let dreamsHTML = '';

            snapshot.forEach((doc) => {
                const data = doc.data();
                if(data.asistio) asistidos++;
                
                // Agrupar edades
                const e = parseInt(data.edad);
                if(e < 18) edades[0]++;
                else if(e <= 25) edades[1]++;
                else if(e <= 35) edades[2]++;
                else if(e <= 50) edades[3]++;
                else edades[4]++;

                // Agregar al feed de sueños (solo si ya asistió para hacerlo más dinámico)
                if(data.asistio) {
                    dreamsHTML = `
                        <div class="p-4 bg-indigo-50 rounded-xl border-l-4 border-indigo-400 animate-pulse">
                            <p class="text-xs font-bold text-indigo-400">${data.nombre.toUpperCase()}</p>
                            <p class="text-slate-700 italic">"${data.sueno}"</p>
                        </div>
                    ` + dreamsHTML;
                }
            });

            // Actualizar UI
            document.getElementById('total-reg').innerText = total;
            document.getElementById('total-asist').innerText = asistidos;
            document.getElementById('porcentaje').innerText = total > 0 ? Math.round((asistidos/total)*100) + "%" : "0%";
            document.getElementById('dream-feed').innerHTML = dreamsHTML;

            // Actualizar Gráfico
            ageChart.data.datasets[0].data = edades;
            ageChart.update();
        });

        // Reloj simple
        setInterval(() => {
            document.getElementById('reloj').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
