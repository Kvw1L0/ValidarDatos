<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Supervisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-950 min-h-screen text-white p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-center text-xl font-bold mb-4 text-indigo-400 uppercase tracking-widest">Control de Acceso</h1>
        <div id="reader" class="rounded-2xl overflow-hidden border-2 border-indigo-500 bg-black shadow-2xl shadow-indigo-500/20"></div>
        
        <div id="res" class="mt-6 p-6 bg-white text-slate-900 rounded-3xl hidden shadow-2xl transform animate-in slide-in-from-bottom duration-300">
            <h2 id="r-nombre" class="text-3xl font-black mb-1 leading-tight uppercase"></h2>
            <p id="r-edad" class="text-indigo-600 font-bold mb-4 tracking-tighter text-lg"></p>
            <div class="bg-indigo-50 p-4 rounded-2xl italic mb-6 border-l-4 border-indigo-500">
                <span class="block text-[10px] text-indigo-400 font-black uppercase not-italic mb-1 tracking-widest">Sueño del Invitado:</span>
                <span id="r-sueno" class="text-slate-700 text-lg"></span>
            </div>
            <div id="r-status" class="py-4 text-center rounded-xl font-black uppercase tracking-widest mb-4"></div>
            <button onclick="location.reload()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black transition">ESCANEAR SIGUIENTE</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function onScanSuccess(id) {
            scanner.clear();
            db.collection("invitados").doc(id).get().then(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    const yaAsistio = data.asistio;
                    document.getElementById('r-nombre').innerText = data.nombre;
                    document.getElementById('r-edad').innerText = data.edad + " AÑOS";
                    document.getElementById('r-sueno').innerText = `"${data.sueno}"`;
                    
                    const s = document.getElementById('r-status');
                    s.innerText = yaAsistio ? "YA INGRESÓ" : "VALIDADO ✅";
                    s.className = yaAsistio ? "py-4 text-center rounded-xl font-black bg-amber-100 text-amber-600 border-2 border-amber-200" : "py-4 text-center rounded-xl font-black bg-green-100 text-green-600 border-2 border-green-200";
                    
                    if(!yaAsistio) db.collection("invitados").doc(id).update({ asistio: true });
                    document.getElementById('res').classList.remove('hidden');
                } else { 
                    alert("QR NO VÁLIDO O NO REGISTRADO"); 
                    location.reload(); 
                }
            }).catch(err => { alert("Error: " + err); location.reload(); });
        }
        let scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
