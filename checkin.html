<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - Santander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body { background-color: #1a1a1a; }
        #reader { border: 4px solid #ec0000 !important; border-radius: 20px; overflow: hidden; }
        #reader__camera_selection { display: none !important; }
    </style>
</head>
<body class="min-h-screen text-white p-6 flex flex-col items-center">
    <div class="w-full max-w-lg">
        <header class="text-center mb-8">
            <h1 class="text-2xl font-black uppercase text-[#ec0000]">Santander Staff</h1>
            <p class="text-gray-400">Validación de Pases Mágicos</p>
        </header>
        <div id="reader" class="w-full bg-black"></div>
        <div id="resultado" class="hidden mt-6 p-8 bg-white text-black rounded-3xl border-t-8 border-[#ec0000] animate-bounce-in">
            <h2 id="res-nombre" class="text-3xl font-black uppercase leading-tight"></h2>
            <p id="res-edad" class="text-lg font-bold text-gray-500 mb-4"></p>
            <div class="bg-red-50 p-4 rounded-xl border-l-4 border-[#ec0000] italic mb-6">
                <span id="res-sueno" class="text-xl"></span>
            </div>
            <div id="status-badge" class="w-full text-center py-4 rounded-xl font-black uppercase tracking-widest mb-4"></div>
            <button onclick="location.reload()" class="w-full bg-black text-white py-4 rounded-xl font-bold uppercase">Siguiente Escaneo</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        function onScanSuccess(id) {
            scanner.clear();
            db.collection("invitados").doc(id).get().then(doc => {
                if (doc.exists) {
                    const u = doc.data();
                    document.getElementById('res-nombre').innerText = u.nombre;
                    document.getElementById('res-edad').innerText = u.edad + " Años";
                    document.getElementById('res-sueno').innerText = u.sueno;
                    const resDiv = document.getElementById('resultado');
                    const badge = document.getElementById('status-badge');
                    document.getElementById('reader').classList.add('hidden');
                    resDiv.classList.remove('hidden');
                    if(u.asistio) {
                        badge.innerText = "⚠️ Entrada Usada";
                        badge.className = "py-4 rounded-xl font-black bg-gray-100 text-gray-500";
                    } else {
                        badge.innerText = "✅ Pase Válido";
                        badge.className = "py-4 rounded-xl font-black bg-green-100 text-green-600";
                        db.collection("invitados").doc(id).update({ asistio: true });
                    }
                } else { alert("QR Inválido"); location.reload(); }
            });
        }
        let scanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250, videoConstraints: { facingMode: "environment" } });
        scanner.render(onScanSuccess);
    </script>
</body>
</html>
