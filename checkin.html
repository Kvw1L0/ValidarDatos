<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h1 class="text-4xl font-black text-slate-800 tracking-tighter italic">EVENT INSIGHTS</h1>
                <p class="text-indigo-500 font-bold uppercase text-xs tracking-widest">Métricas en tiempo real</p>
            </div>
            <button onclick="exportar()" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-full font-bold shadow-xl transition transform hover:scale-105 active:scale-95 flex items-center gap-2">
                DESCARGAR EXCEL (.CSV)
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-8 rounded-3xl shadow-sm border-b-8 border-indigo-500 text-center">
                <p class="text-slate-400 font-bold uppercase text-xs mb-1">Registrados</p>
                <h2 id="t-reg" class="text-6xl font-black text-slate-800">0</h2>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border-b-8 border-green-500 text-center">
                <p class="text-slate-400 font-bold uppercase text-xs mb-1">Ingresados</p>
                <h2 id="t-asist" class="text-6xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm border-b-8 border-amber-500 text-center">
                <p class="text-slate-400 font-bold uppercase text-xs mb-1">% Asistencia</p>
                <h2 id="t-porc" class="text-6xl font-black text-amber-500">0%</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-3xl shadow-sm">
                <h3 class="font-black text-slate-400 uppercase text-sm mb-6 tracking-widest">Distribución por Edades</h3>
                <canvas id="chart"></canvas>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm">
                <h3 class="font-black text-slate-400 uppercase text-sm mb-6 tracking-widest">Muro de Sueños</h3>
                <div id="feed" class="space-y-4 overflow-y-auto max-h-[400px] pr-2"></div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const ctx = document.getElementById('chart').getContext('2d');
        let chart = new Chart(ctx, {
            type: 'bar',
            data: { 
                labels: ['<18', '18-25', '26-35', '36+'], 
                datasets: [{ 
                    label: 'Invitados', 
                    data: [0,0,0,0], 
                    backgroundColor: '#6366f1',
                    borderRadius: 10
                }] 
            },
            options: { plugins: { legend: { display: false } } }
        });

        db.collection("invitados").orderBy("fecha", "desc").onSnapshot(snap => {
            let reg = snap.size, asist = 0, eds = [0,0,0,0], html = '';
            snap.forEach(doc => {
                const d = doc.data();
                if(d.asistio) asist++;
                const e = parseInt(d.edad);
                if(e<18) eds[0]++; else if(e<=25) eds[1]++; else if(e<=35) eds[2]++; else eds[3]++;
                
                html += `<div class="p-4 ${d.asistio ? 'bg-indigo-50 border-indigo-500' : 'bg-slate-50 border-slate-200'} border-l-4 rounded-r-xl transition-all">
                    <p class="text-[10px] font-black uppercase ${d.asistio ? 'text-indigo-400' : 'text-slate-400'}">${d.nombre} ${d.asistio ? '• INGRESÓ' : ''}</p>
                    <p class="italic text-slate-700 font-medium leading-tight">"${d.sueno}"</p>
                </div>`;
            });
            document.getElementById('t-reg').innerText = reg;
            document.getElementById('t-asist').innerText = asist;
            document.getElementById('t-porc').innerText = reg > 0 ? Math.round((asist/reg)*100) + "%" : "0%";
            document.getElementById('feed').innerHTML = html;
            chart.data.datasets[0].data = eds;
            chart.update();
        });

        function exportar() {
            db.collection("invitados").get().then(snap => {
                let csv = "\uFEFFNombre,Edad,Sueño,Asistió\n";
                snap.forEach(doc => { 
                    const d = doc.data(); 
                    csv += `${d.nombre},${d.edad},"${d.sueno}",${d.asistio ? 'SÍ' : 'NO'}\n`; 
                });
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'kpis_evento_sueños.csv'; a.click();
            });
        }
    </script>
</body>
</html>
