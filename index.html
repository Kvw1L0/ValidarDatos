<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Santander</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        body {
            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        .vidrio {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 0, 0, 0.2);
        }
        .boton-santander {
            background: #ec0000; /* Rojo Santander */
            transition: all 0.3s ease;
        }
        .boton-santander:hover {
            background: #cc0000;
            box-shadow: 0 10px 20px rgba(236, 0, 0, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="vidrio p-10 rounded-3xl shadow-2xl w-full max-w-lg border-t-8 border-[#ec0000]">
        <div id="form-ui">
            <div class="text-center mb-10">
                <img src="logo.png" alt="Logo Santander" class="h-20 mx-auto mb-4 object-contain">
                <p class="text-[#ec0000] font-bold uppercase tracking-widest text-sm">Tu sueño es nuestro motor</p>
            </div>
            <div class="space-y-6">
                <input id="nombre" type="text" placeholder="Nombre Completo" class="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl focus:border-[#ec0000] outline-none transition-all font-medium">
                <input id="edad" type="number" placeholder="Edad" class="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl focus:border-[#ec0000] outline-none transition-all font-medium">
                <textarea id="sueno" placeholder="¿Cuál es tu sueño a cumplir?" class="w-full p-4 bg-white border-2 border-gray-100 rounded-2xl h-32 focus:border-[#ec0000] outline-none transition-all resize-none font-medium"></textarea>
                <button onclick="guardarYGenerar()" id="btn-submit" class="w-full boton-santander text-white font-black py-5 rounded-2xl shadow-lg uppercase tracking-widest">Generar mi Pase</button>
            </div>
        </div>
        <div id="qr-ui" class="hidden text-center">
            <h2 class="text-3xl font-black text-[#ec0000] mb-2 uppercase">¡Todo listo!</h2>
            <p class="text-gray-500 mb-8 font-medium">Presenta este QR al ingresar al evento</p>
            <div class="flex justify-center p-6 bg-white border-4 border-dashed border-gray-200 mb-8 rounded-3xl inline-block mx-auto">
                <div id="qrcode"></div>
            </div>
            <button onclick="location.reload()" class="text-[#ec0000] font-bold hover:underline">Registrar a otra persona</button>
        </div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        async function guardarYGenerar() {
            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const sueno = document.getElementById('sueno').value;
            if(!nombre || !edad || !sueno) return alert("Completa todos los datos");
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; 
            btn.innerText = "PROCESANDO...";
            
            try {
                const docRef = await db.collection("invitados").add({
                    nombre, edad, sueno, asistio: false, fechaRegistro: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('form-ui').classList.add('hidden');
                document.getElementById('qr-ui').classList.remove('hidden');
                new QRCode(document.getElementById("qrcode"), { text: docRef.id, width: 220, height: 220, colorDark: "#ec0000" });
            } catch (e) { 
                alert("Error: " + e.message); 
                btn.disabled = false; 
                btn.innerText = "Generar mi Pase";
            }
        }
    </script>
</body>
</html>
