<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tu Pase Mágico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    
    <style>
        /* Estilos personalizados para el fondo y animaciones */
        body {
            background-image: url('fondo.png'); /* Tu fondo personalizado */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .vidrio {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        
        .animacion-entrada {
            animation: fadeInScale 0.6s ease-out forwards;
        }
        
        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .boton-magico {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .boton-magico:hover {
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
            transform: translateY(-2px);
        }
        
        .boton-magico:active {
            transform: translateY(1px);
        }
        
        .boton-magico::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(to bottom right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0) 100%);
            transform: rotate(45deg);
            transition: all 0.6s ease;
        }
        
        .boton-magico:hover::after {
            left: 100%;
            top: 100%;
        }
        
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="vidrio p-10 rounded-3xl shadow-2xl w-full max-w-lg animacion-entrada border-4 border-white/50">
        <div id="form-ui">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-indigo-950 tracking-tighter">¡Te damos la Bienvenida!</h1>
                <p class="text-indigo-600 mt-2 font-medium">Regístrate y comparte tu gran sueño con el mundo</p>
                <div class="w-24 h-1 bg-gradient-to-r from-indigo-500 to-purple-500 mx-auto mt-4 rounded-full"></div>
            </div>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-indigo-950 mb-1.5 ml-1">Nombre Completo</label>
                    <input id="nombre" type="text" placeholder="Ej: Camilo Andrés" class="w-full p-4 bg-white/70 border-2 border-indigo-100 rounded-2xl focus:ring-4 focus:ring-indigo-200 outline-none transition-all placeholder:text-indigo-300 text-indigo-950 font-medium">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-indigo-950 mb-1.5 ml-1">Edad</label>
                    <input id="edad" type="number" placeholder="Ej: 20" class="w-full p-4 bg-white/70 border-2 border-indigo-100 rounded-2xl focus:ring-4 focus:ring-indigo-200 outline-none transition-all placeholder:text-indigo-300 text-indigo-950 font-medium">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-indigo-950 mb-1.5 ml-1">¿Cuál es tu sueño a cumplir?</label>
                    <textarea id="sueno" placeholder="Cuéntanos brevemente qué sueño te gustaría hacer realidad..." class="w-full p-4 bg-white/70 border-2 border-indigo-100 rounded-2xl h-36 focus:ring-4 focus:ring-indigo-200 outline-none transition-all resize-none placeholder:text-indigo-300 text-indigo-950 font-medium leading-relaxed"></textarea>
                </div>
                
                <button onclick="guardarYGenerar()" id="btn-submit" class="w-full boton-magico text-white font-bold py-5 rounded-2xl transition-all transform hover:scale-[1.03] active:scale-95 shadow-lg shadow-indigo-200 text-lg uppercase tracking-widest">
                    Generar mi Pase Mágico
                </button>
            </div>
        </div>

        <div id="qr-ui" class="hidden text-center animate-in fade-in duration-700">
            <div class="mb-8">
                <div class="mx-auto w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-5 border-4 border-white shadow-inner">
                    <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h2 class="text-3xl font-extrabold text-indigo-950 tracking-tight">¡Todo listo, Camilo!</h2>
                <p class="text-indigo-600 mt-2 font-medium">Guarda este código para el ingreso al evento</p>
                <div class="w-24 h-1 bg-gradient-to-r from-green-400 to-green-600 mx-auto mt-4 rounded-full"></div>
            </div>
            
            <div class="flex justify-center p-8 bg-white border-4 border-dashed border-indigo-200 mb-8 rounded-3xl shadow-inner relative">
                <div id="qrcode"></div>
                <div class="absolute -top-3 -left-3 w-6 h-6 bg-indigo-100 rounded-full border-4 border-white"></div>
                <div class="absolute -bottom-3 -right-3 w-6 h-6 bg-indigo-100 rounded-full border-4 border-white"></div>
            </div>
            
            <button onclick="location.reload()" class="text-indigo-600 font-semibold hover:text-purple-700 transition hover:underline">Registrar a otra persona</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (validatos-18ec1)
        const firebaseConfig = {
            apiKey: "AIzaSyB2AAnosFdchf9vxhBRzlf5F0GpRDvzFSQ",
            authDomain: "validatos-18ec1.firebaseapp.com",
            projectId: "validatos-18ec1",
            storageBucket: "validatos-18ec1.firebasestorage.app",
            messagingSenderId: "781964238026",
            appId: "1:781964238026:web:3573344e6f0d70922de833"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function guardarYGenerar() {
            const nombre = document.getElementById('nombre').value.trim();
            const edad = document.getElementById('edad').value;
            const sueno = document.getElementById('sueno').value.trim();
            const btn = document.getElementById('btn-submit');

            // Validación básica
            if(!nombre || !edad || !sueno) {
                alert("¡Ups! Parece que faltan datos. Por favor, completa todos los campos.");
                return;
            }

            // Cambiar estado del botón
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Procesando tu Pase...
            `;

            try {
                // 1. Guardar en Firestore (validatos-18ec1)
                const docRef = await db.collection("invitados").add({
                    nombre: nombre,
                    edad: edad,
                    sueno: sueno,
                    asistio: false, // Por defecto, no ha asistido
                    fechaRegistro: firebase.firestore.FieldValue.serverTimestamp() // Fecha del servidor
                });

                // 2. Cambiar UI: Ocultar formulario, mostrar QR
                document.getElementById('form-ui').classList.add('hidden');
                document.getElementById('qr-ui').classList.remove('hidden');

                // 3. Generar QR con el ID único del documento de Firebase
                // Usamos un color azul índigo oscuro para que sea estético y legible
                new QRCode(document.getElementById("qrcode"), {
                    text: docRef.id,
                    width: 256,
                    height: 256,
                    colorDark: "#312e81", 
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });

            } catch (e) {
                console.error("Error al guardar en Firebase: ", e);
                alert("Hubo un problema al generar tu pase. Por favor, inténtalo de nuevo. Error: " + e.message);
                
                // Revertir estado del botón en caso de error
                btn.disabled = false;
                btn.innerText = "Generar mi Pase Mágico";
            }
        }
    </script>
</body>
</html>
