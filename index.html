<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Sueños</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div id="form-ui">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">Bienvenido</h1>
            <p class="text-gray-500 mb-6">Regístrate para el evento y cuéntanos tu sueño.</p>
            
            <input id="nombre" type="text" placeholder="Nombre completo" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            <input id="edad" type="number" placeholder="Edad" class="w-full p-3 mb-4 border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
            <textarea id="sueno" placeholder="¿Cuál es tu sueño a cumplir?" class="w-full p-3 mb-6 border rounded-lg h-24 focus:ring-2 focus:ring-blue-400 outline-none"></textarea>
            
            <button onclick="guardarYGenerar()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition shadow-lg">
                Obtener mi Pase QR
            </button>
        </div>

        <div id="qr-ui" class="hidden text-center">
            <h2 class="text-2xl font-bold mb-4 text-green-600">¡Registro Exitoso!</h2>
            <div id="qrcode" class="flex justify-center mb-6 p-4 bg-white border rounded-xl"></div>
            <p class="text-sm text-gray-500 mb-6">Muestra este código al ingresar al evento.</p>
            <button onclick="location.reload()" class="text-blue-600 font-semibold underline">Nuevo registro</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE (Reemplaza con tus datos)
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO_ID",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "TU_SENDER_ID",
            appId: "TU_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function guardarYGenerar() {
            const nombre = document.getElementById('nombre').value;
            const edad = document.getElementById('edad').value;
            const sueno = document.getElementById('sueno').value;

            if(!nombre || !edad || !sueno) return alert("Por favor completa todos los campos");

            try {
                // 1. Guardar en Firestore para obtener un ID único
                const docRef = await db.collection("invitados").add({
                    nombre, edad, sueno,
                    asistio: false,
                    fecha: new Date()
                });

                // 2. Cambiar UI
                document.getElementById('form-ui').classList.add('hidden');
                document.getElementById('qr-ui').classList.remove('hidden');

                // 3. Generar QR con el ID del documento
                new QRCode(document.getElementById("qrcode"), {
                    text: docRef.id, // Solo guardamos el ID para seguridad
                    width: 256,
                    height: 256,
                    colorDark: "#1e40af"
                });

            } catch (e) { console.error("Error: ", e); }
        }
    </script>
</body>
</html>
